name: Bug Report
description: Report a bug to help us improve CHRONODESK
title: "[Bug] "
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched the [existing issues](https://github.com/mrmedani/chronodesk/issues) for similar bugs
          required: true
        - label: I am running the latest version
          required: false

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      description: How were you using CHRONODESK?
      options:
        - Flutter app (chronodesk_flutter.exe)
        - CLI host (cargo run -- --peer-id ...)
        - CLI client (cargo run -- --connect ...)
        - Signaling server (cargo run --bin signaling-server)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: When I try to connect, the client crashes with...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Run signaling server
        2. Launch Flutter app
        3. Enter remote peer ID and click Connect
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Please copy and paste any relevant log output
      render: shell

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows 10/11
        - macOS
        - Linux (X11)
        - Linux (Wayland)
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: CHRONODESK Version
      description: Version number or git commit hash
      placeholder: v0.2.0 or commit abc123
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, network topology, or anything else relevant
