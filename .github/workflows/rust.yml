name: Rust CI

on:
  push:
    branches: [master, main, "dev/**"]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install system dependencies (ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libwayland-dev libxkbcommon-dev libegl1-mesa-dev libpipewire-0.3-dev libclang-dev libssl-dev libavcodec-dev libavutil-dev libavformat-dev libavfilter-dev libavdevice-dev libswresample-dev libswscale-dev libpostproc-dev

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Check (default features)
        run: cargo check --all-targets

      - name: Check (ffmpeg feature)
        if: matrix.os == 'ubuntu-latest'
        run: cargo check --features ffmpeg

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Format check
        run: cargo fmt --all --check

  build:
    name: Build
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libwayland-dev libxkbcommon-dev libegl1-mesa-dev libpipewire-0.3-dev libclang-dev libssl-dev libavcodec-dev libavutil-dev libavformat-dev libavfilter-dev libavdevice-dev libswresample-dev libswscale-dev libpostproc-dev


      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build binary
        continue-on-error: true
        id: build-bin
        run: cargo build --release 2>build-err.log

      - name: Build library (DLL/SO)
        if: steps.build-bin.outcome == 'success'
        continue-on-error: true
        id: build-lib
        run: cargo build --release --lib 2>build-lib-err.log

      - name: Show build errors as annotations
        if: always()
        run: |
          for f in build-err.log build-lib-err.log; do
            if [ -f "$f" ]; then
              tail -30 "$f" | while IFS= read -r line; do
                echo "::error file=$f,title=build error::$line"
              done
            fi
          done

      - name: Fail if any build failed
        if: steps.build-bin.outcome != 'success' || steps.build-lib.outcome != 'success'
        run: exit 1

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chronodesk-bin-${{ matrix.os }}
          path: |
            target/release/chronodesk${{ matrix.os == 'windows-latest' && '.exe' || '' }}
            target/release/signaling-server${{ matrix.os == 'windows-latest' && '.exe' || '' }}
          if-no-files-found: warn

      - name: Upload library artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chronodesk-lib-${{ matrix.os }}
          path: |
            target/release/libchronodesk.so
            target/release/libchronodesk.dylib
            target/release/chronodesk.dll
          if-no-files-found: warn

  test:
    name: Test
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all-targets

  flutter:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Flutter pub get
        run: cd chronodesk_flutter && flutter pub get

      - name: Flutter analyze
        run: cd chronodesk_flutter && flutter analyze --no-fatal-infos --no-fatal-warnings
