name: Rust CI

on:
  push:
    branches: [master, main, "dev/**"]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install system dependencies (ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libwayland-dev libxkbcommon-dev libegl1-mesa-dev libpipewire-0.3-dev libclang-dev libssl-dev libavcodec-dev libavutil-dev libavformat-dev libavfilter-dev libavdevice-dev libswresample-dev libswscale-dev libpostproc-dev

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Check (default features)
        run: cargo check --all-targets

      - name: Check (ffmpeg feature)
        id: ffmpeg-check
        if: matrix.os == 'ubuntu-latest'
        continue-on-error: true
        run: |
          cargo check --features ffmpeg 2>&1 | tee ffmpeg-check.log; exit ${PIPESTATUS[0]}

      - name: Display ffmpeg errors
        if: matrix.os == 'ubuntu-latest' && always()
        run: |
          {
            echo "### FFmpeg check log"
            echo '```'
            cat ffmpeg-check.log | head -200
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload ffmpeg check log
        if: matrix.os == 'ubuntu-latest' && always()
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-check-log
          path: ffmpeg-check.log

      - name: Fail if ffmpeg check failed
        if: matrix.os == 'ubuntu-latest' && steps.ffmpeg-check.outcome != 'success'
        run: exit 1

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Format check
        run: cargo fmt --all --check

  build:
    name: Build
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libwayland-dev libxkbcommon-dev libegl1-mesa-dev libpipewire-0.3-dev libclang-dev libssl-dev libavcodec-dev libavutil-dev libavformat-dev libavfilter-dev libavdevice-dev libswresample-dev libswscale-dev libpostproc-dev


      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build binary
        run: cargo build --release
      - name: Build library (DLL/SO)
        run: cargo build --release --lib

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chronodesk-bin-${{ matrix.os }}
          path: |
            target/release/chronodesk${{ matrix.os == 'windows-latest' && '.exe' || '' }}
            target/release/signaling-server${{ matrix.os == 'windows-latest' && '.exe' || '' }}
          if-no-files-found: warn

      - name: Upload library artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chronodesk-lib-${{ matrix.os }}
          path: |
            target/release/libchronodesk.so
            target/release/libchronodesk.dylib
            target/release/chronodesk.dll
          if-no-files-found: warn

  test:
    name: Test
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all-targets

  flutter:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Flutter pub get
        run: cd chronodesk_flutter && flutter pub get

      - name: Flutter analyze
        run: cd chronodesk_flutter && flutter analyze --no-fatal-infos --no-fatal-warnings
