name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    name: Build & Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libwayland-dev libxkbcommon-dev libegl1-mesa-dev libpipewire-0.3-dev libclang-dev libssl-dev libavcodec-dev libavutil-dev libavformat-dev libavfilter-dev libavdevice-dev libswresample-dev libswscale-dev libpostproc-dev libgbm-dev libxdo-dev

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release library
        run: cargo build --release --target ${{ matrix.target }} --lib

      - name: Package binaries
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/chronodesk${{ matrix.ext }} dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/signaling-server${{ matrix.ext }} dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/chronodesk.dll dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/libchronodesk.so dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/libchronodesk.dylib dist/ 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chronodesk-${{ matrix.target }}
          path: dist/*

  flutter-build:
    name: Flutter Build (Windows)
    runs-on: windows-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Download Rust DLL
        uses: actions/download-artifact@v4
        with:
          name: chronodesk-x86_64-pc-windows-msvc
          path: dll

      - name: Flutter pub get
        id: flutter_pub_get
        continue-on-error: true
        run: cd chronodesk_flutter && flutter pub get 2>&1

      - name: Flutter build
        id: flutter_build
        continue-on-error: true
        shell: pwsh
        run: |
          cd chronodesk_flutter
          flutter build windows --release 2>&1 | Tee-Object -FilePath flutter_build.log
          if ($LASTEXITCODE -ne 0) {
            Get-Content flutter_build.log | ForEach-Object { echo "::error::$_" }
          }

      - name: Copy DLL to output
        if: steps.flutter_pub_get.conclusion == 'success' && steps.flutter_build.conclusion == 'success'
        run: |
          copy dll\chronodesk.dll chronodesk_flutter\build\windows\x64\runner\Release\

      - name: Package Flutter as zip
        if: steps.flutter_pub_get.conclusion == 'success' && steps.flutter_build.conclusion == 'success'
        shell: pwsh
        run: |
          cd chronodesk_flutter\build\windows\x64\runner\Release
          Compress-Archive -Path * -DestinationPath chronodesk_flutter_windows.zip

      - name: Install Inno Setup
        if: steps.flutter_pub_get.conclusion == 'success' && steps.flutter_build.conclusion == 'success'
        shell: pwsh
        run: choco install innosetup --no-progress

      - name: Build Windows installer
        if: steps.flutter_pub_get.conclusion == 'success' && steps.flutter_build.conclusion == 'success'
        shell: pwsh
        run: |
          $env:APP_VERSION = "${{ github.ref_name }}" -replace '^v'
          iscc installer.iss

      - name: Upload Flutter artifact (with installer)
        if: steps.flutter_pub_get.conclusion == 'success' && steps.flutter_build.conclusion == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: chronodesk-flutter-windows
          path: |
            chronodesk_flutter\build\windows\x64\runner\Release\chronodesk_flutter_windows.zip
            installer/chronodesk-windows-setup.exe

      - name: Download Flutter zip from latest release
        if: steps.flutter_pub_get.conclusion != 'success' || steps.flutter_build.conclusion != 'success'
        shell: pwsh
        run: |
          $url = "https://github.com/mrmedani/chronodesk/releases/latest/download/chronodesk_flutter_windows.zip"
          $out = "chronodesk_flutter_windows.zip"
          Invoke-WebRequest -Uri $url -OutFile $out

      - name: Upload fallback Flutter artifact
        if: steps.flutter_pub_get.conclusion != 'success' || steps.flutter_build.conclusion != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: chronodesk-flutter-windows
          path: chronodesk_flutter_windows.zip

  publish:
    name: Create Release
    needs: [release, flutter-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate checksums
        run: |
          for dir in chronodesk-*/; do
            (cd "$dir" && sha256sum * > "../${dir%/}.sha256")
          done
          cd chronodesk-flutter-windows
          sha256sum * > "../chronodesk-flutter-windows.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            chronodesk-*/*
            chronodesk-flutter-windows/*
            *.sha256
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') }}
