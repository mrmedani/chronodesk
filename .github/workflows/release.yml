name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    name: Build & Release
    runs-on: ${{ matrix.os }}
    env:
      CMAKE_POLICY_VERSION_MINIMUM: 3.5
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq || true
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libegl1-mesa-dev libpipewire-0.3-dev libclang-dev libssl-dev libavcodec-dev libavutil-dev libavformat-dev libavfilter-dev libavdevice-dev libswresample-dev libswscale-dev libpostproc-dev libgbm-dev libxdo-dev libasound2-dev libdbus-1-dev

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release library
        run: cargo build --release --target ${{ matrix.target }} --lib

      - name: Package binaries
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/chronodesk-bin${{ matrix.ext }} dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/signaling-server${{ matrix.ext }} dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/chronodesk.dll dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/libchronodesk.so dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/libchronodesk.dylib dist/ 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chronodesk-${{ matrix.target }}
          path: dist/*

  flutter-build:
    name: Flutter Build (Windows)
    runs-on: windows-latest
    needs: release
    env:
      CMAKE_POLICY_VERSION_MINIMUM: 3.5
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Download Rust DLL
        uses: actions/download-artifact@v4
        with:
          name: chronodesk-x86_64-pc-windows-msvc
          path: dll

      - name: Flutter pub get
        run: cd chronodesk_flutter && flutter pub get 2>&1

      - name: Flutter build
        shell: pwsh
        run: cd chronodesk_flutter && flutter build windows --release 2>&1

      - name: Copy DLL to output
        run: |
          copy dll\chronodesk.dll chronodesk_flutter\build\windows\x64\runner\Release\

      - name: Package Flutter as zip
        shell: pwsh
        run: |
          cd chronodesk_flutter\build\windows\x64\runner\Release
          Compress-Archive -Path * -DestinationPath chronodesk_flutter_windows.zip

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: |
          $env:APP_VERSION = "${{ github.ref_name }}" -replace '^v'
          iscc installer.iss

      - name: Stage installer & zip
        shell: pwsh
        run: |
          mkdir upload -Force
          copy "chronodesk_flutter\build\windows\x64\runner\Release\chronodesk_flutter_windows.zip" upload\
          copy "installer\chronodesk-windows-setup.exe" upload\

      - name: Generate installer checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash "installer\chronodesk-windows-setup.exe" -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "installer\chronodesk-windows-setup.exe.sha256" -Value "$hash  chronodesk-windows-setup.exe"
          copy "installer\chronodesk-windows-setup.exe.sha256" upload\

      - name: Upload Flutter artifact
        uses: actions/upload-artifact@v4
        with:
          name: chronodesk-flutter-windows
          path: upload/*

  publish:
    name: Create Release
    needs: [release, flutter-build]
    runs-on: ubuntu-latest
    env:
      CMAKE_POLICY_VERSION_MINIMUM: 3.5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate checksums
        shell: bash
        run: |
          for d in */; do
            d="${d%/}"
            case "$d" in chronodesk-*)
              out="${d}.sha256"
              (cd "$d" && find . -type f -exec sha256sum {} +) > "$out" 2>/dev/null || true
              [ -s "$out" ] || echo "# empty" > "$out"
            esac
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            chronodesk-*/**/*
            chronodesk-flutter-windows/chronodesk-windows-setup.exe
            chronodesk-flutter-windows/chronodesk-windows-setup.exe.sha256
            *.sha256
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') }}
