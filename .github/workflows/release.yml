name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    name: Build & Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libwayland-dev libxkbcommon-dev libegl1-mesa-dev libpipewire-0.3-dev libclang-dev libssl-dev

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release library
        run: cargo build --release --target ${{ matrix.target }} --lib

      - name: Package binaries
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/chronodesk${{ matrix.ext }} dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/signaling-server${{ matrix.ext }} dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/chronodesk.dll dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/libchronodesk.so dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/libchronodesk.dylib dist/ 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chronodesk-${{ matrix.target }}
          path: dist/*

  flutter-build:
    name: Flutter Build (Windows)
    runs-on: windows-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Download Rust DLL
        uses: actions/download-artifact@v4
        with:
          name: chronodesk-x86_64-pc-windows-msvc
          path: dll

      - name: Build Flutter
        run: |
          cd chronodesk_flutter
          flutter pub get
          flutter build windows --release

      - name: Copy DLL to output
        run: |
          copy dll\chronodesk.dll chronodesk_flutter\build\windows\x64\runner\Release\

      - name: Package Flutter as zip
        shell: pwsh
        run: |
          cd chronodesk_flutter\build\windows\x64\runner\Release
          Compress-Archive -Path * -DestinationPath chronodesk_flutter_windows.zip

      - name: Upload Flutter artifact
        uses: actions/upload-artifact@v4
        with:
          name: chronodesk-flutter-windows
          path: chronodesk_flutter\build\windows\x64\runner\Release\chronodesk_flutter_windows.zip

  publish:
    name: Create Release
    needs: [release, flutter-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate checksums
        run: |
          for dir in chronodesk-*/; do
            (cd "$dir" && sha256sum * > "../${dir%/}.sha256")
          done
          cd chronodesk-flutter-windows
          sha256sum * > "../chronodesk-flutter-windows.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            chronodesk-*/*
            chronodesk-flutter-windows/*
            *.sha256
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') }}
