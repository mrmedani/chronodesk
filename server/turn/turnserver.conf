# CHRONODESK TURN Server Config
listening-port=3478
alt-listening-port=3479
listening-ip=0.0.0.0
verbose
fingerprint

# Auth (username/password) — MUST be overridden at deploy time via sed
lt-cred-mech
user=<TURN_USER>:<TURN_PASS>

# Realm
realm=chronodesk.app

# External IP (override via env or sed during deploy)
external-ip=<YOUR_SERVER_IP>

# Relay ports
min-port=49152
max-port=65535

# No TLS for now (add later if needed)
no-tls
no-dtls
